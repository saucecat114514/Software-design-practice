server:
  port: 8080

spring:
  application:
    name: edu-charge-system
  # H2 嵌入式数据库（ADR-005 / CR-ITEM-005：本地可运行，零外部依赖）
  datasource:
    url: jdbc:h2:mem:edu;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
      path: /h2-console
  # JSON 字段下划线命名，与 OAS 契约对齐（snake_case）
  jackson:
    property-naming-strategy: SNAKE_CASE

# MyBatis（C-CODE-0015：Repository 经 MyBatis Mapper）
mybatis:
  configuration:
    map-underscore-to-camel-case: true

# CCB 量化阈值统一配置注入（C-ARCH-0008 / C-CODE-0012：禁硬编码魔数）
edu:
  charge:
    # 赠送课时退费折价系数，默认 1.0，取值 0~1（CON-CCB-002 / DEF-001 口径）
    gift-refund-discount-factor: 1.0
    # 发票自动开票审核阈值（元），默认 5000（CON-CCB-003）
    invoice-auto-threshold: 5000.00
    # 退费小额自动审批阈值（元）：小于该值走一级、可超时异常通过；大额强制校长（CON-CCB-007）
    refund-small-amount-threshold: 5000.00
    # 退费大额强制校长审批阈值（元）：达到该值必须校长手动、绝不自动通过
    refund-principal-threshold: 10000.00
    # 排课/试听占用缓冲（分钟），默认 5，范围 1~30（CON-CCB-001）
    schedule-buffer-minutes: 5
    # 报名优惠合计触发特批审批的占比阈值（业务规则，配置注入）
    order-approval-ratio: 0.25
    # v2/DEF-001 退费消耗进度折损率分档（配置注入）：≤30%折0% / ≤60%折10% / >60%折20%
    refund-loss-low-threshold: 0.30
    refund-loss-high-threshold: 0.60
    refund-loss-rate-mid: 0.10
    refund-loss-rate-high: 0.20

logging:
  level:
    com.edu: info
