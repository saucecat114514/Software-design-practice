server:
  port: 8080

spring:
  application:
    name: edu-charge-system

# CCB 量化阈值统一配置注入（C-ARCH-0008 / C-CODE-0012：禁硬编码魔数）
edu:
  charge:
    # 赠送课时退费折价系数，默认 1.0，取值 0~1（CON-CCB-002 / DEF-001 口径）
    gift-refund-discount-factor: 1.0
    # 发票自动开票审核阈值（元），默认 5000（CON-CCB-003）
    invoice-auto-threshold: 5000.00
    # 退费小额自动审批阈值（元）：小于该值走一级、可超时异常通过；大额强制校长（CON-CCB-007）
    refund-small-amount-threshold: 5000.00
    # 退费大额强制校长审批阈值（元）：达到该值必须校长手动、绝不自动通过
    refund-principal-threshold: 10000.00
    # 排课/试听占用缓冲（分钟），默认 5，范围 1~30（CON-CCB-001）
    schedule-buffer-minutes: 5
    # 报名优惠合计触发特批审批的占比阈值（业务规则，配置注入）
    order-approval-ratio: 0.25

logging:
  level:
    com.edu: info
