<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A1 需求获取对话 · 教育培训机构教务收费管理系统</title>
<style>
  :root{
    --bg:#f4f6fb; --panel:#fff; --ink:#1f2a44; --muted:#6b7794;
    --line:#e5e9f2; --agent:#eef2ff; --agentbd:#c7d2fe;
    --self:#0f7b6c; --selfink:#fff; --accent:#3b5bdb;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column}
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 18px;
    display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:700}
  header .sub{font-size:12px;color:var(--muted)}
  select,button{font-size:14px;border:1px solid var(--line);border-radius:8px;padding:7px 12px;background:#fff;cursor:pointer}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .spacer{flex:1}
  main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;max-width:920px;width:100%;margin:0 auto}
  .row{display:flex;gap:10px;max-width:82%}
  .row.self{align-self:flex-end;flex-direction:row-reverse}
  .row.agent{align-self:flex-start}
  .avatar{width:34px;height:34px;border-radius:50%;flex:0 0 34px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
  .agent .avatar{background:var(--accent)}
  .self .avatar{background:var(--self)}
  .bubble{padding:11px 14px;border-radius:12px;white-space:pre-wrap;word-break:break-word;line-height:1.6;font-size:14px}
  .agent .bubble{background:var(--agent);border:1px solid var(--agentbd)}
  .self .bubble{background:var(--self);color:var(--selfink)}
  .who{font-size:11px;color:var(--muted);margin-bottom:3px}
  footer{background:var(--panel);border-top:1px solid var(--line);padding:12px 18px}
  .toolbar{max-width:920px;margin:0 auto 8px;display:flex;gap:8px;flex-wrap:wrap}
  .inputbar{max-width:920px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;resize:none;height:54px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
  .status{max-width:920px;margin:6px auto 0;font-size:12px;color:var(--muted);min-height:16px}
  .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:40px}
</style>
</head>
<body>
  <header>
    <div>
      <h1>A1 需求获取对话</h1>
      <div class="sub">己方=涉众 · 对方=A1 需求获取智能体 · 教育培训机构教务收费管理系统</div>
    </div>
    <div class="spacer"></div>
    <label class="sub">访谈涉众：</label>
    <select id="agentSel"></select>
    <button id="startBtn" class="primary">开始 / 重新访谈</button>
    <button id="sumBtn">整理需求</button>
    <button id="saveBtn">保存到知识库</button>
  </header>

  <main id="chat">
    <div class="hint">选择要访谈的涉众，点「开始 / 重新访谈」，A1 智能体会先开场提问。<br/>你（扮演涉众）在下方输入框作答，回答内容取自教师 5000 平台对应涉众 agent。</div>
  </main>

  <footer>
    <div class="toolbar"></div>
    <div class="inputbar">
      <textarea id="input" placeholder="以涉众身份作答…（Enter 发送，Shift+Enter 换行）"></textarea>
      <button id="sendBtn" class="primary">发送</button>
    </div>
    <div class="status" id="status"></div>
  </footer>

<script>
const $ = s => document.querySelector(s);
const chat = $("#chat"), input = $("#input"), status = $("#status"), sel = $("#agentSel");
let messages = [];      // {role:'user'(涉众)|'assistant'(A1), content}
let targetName = "";
let busy = false;

function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML;}

function render(){
  chat.innerHTML = "";
  if(messages.length===0){
    chat.innerHTML = '<div class="hint">选择涉众并点「开始 / 重新访谈」。</div>'; return;
  }
  for(const m of messages){
    const self = m.role==="user";
    const who = self ? ("涉众（"+targetName+"）" ) : "A1 需求获取智能体";
    const ava = self ? "涉众" : "A1";
    chat.insertAdjacentHTML("beforeend",
      `<div class="row ${self?'self':'agent'}"><div class="avatar">${ava}</div>`+
      `<div><div class="who">${who}</div><div class="bubble">${esc(m.content)}</div></div></div>`);
  }
  chat.scrollTop = chat.scrollHeight;
}

async function callChat(){
  busy = true; setBusy(); status.textContent = "A1 智能体思考中…";
  try{
    const r = await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({agent:sel.value, messages:messages})});
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    messages.push({role:"assistant", content:d.reply});
    render(); status.textContent="";
  }catch(e){ status.textContent = "出错："+e.message; }
  finally{ busy=false; setBusy(); }
}
function setBusy(){ for(const b of ["#startBtn","#sendBtn","#sumBtn","#saveBtn"]) $(b).disabled=busy; }

$("#startBtn").onclick = async ()=>{
  if(busy) return;
  targetName = sel.options[sel.selectedIndex].dataset.target;
  messages = [];                       // 空 → 后端用 kickoff 让 A1 开场
  render(); await callChat();
};
$("#sendBtn").onclick = async ()=>{
  if(busy) return;
  const t = input.value.trim(); if(!t) return;
  if(messages.length===0){ status.textContent="请先点「开始 / 重新访谈」"; return; }
  messages.push({role:"user", content:t}); input.value=""; render(); await callChat();
};
$("#sumBtn").onclick = async ()=>{
  if(busy || messages.length===0) return;
  messages.push({role:"user", content:"请把我们刚才聊到的内容整理成结构化需求条目（含 REQ 编号、涉众原话、需求提炼、优先级、验收要点）。"});
  render(); await callChat();
};
$("#saveBtn").onclick = async ()=>{
  if(messages.length===0){ status.textContent="还没有对话内容"; return; }
  const lines = messages.map(m => (m.role==="user"?("【涉众·"+targetName+"】"):"【A1需求获取】")+"\n"+m.content).join("\n\n");
  const r = await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({agent:sel.value, target:targetName, transcript:lines})});
  const d = await r.json();
  status.textContent = d.path ? ("已保存到知识库："+d.path) : ("保存失败："+(d.error||""));
};
input.addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); $("#sendBtn").click(); }});

(async function init(){
  const items = await (await fetch("/api/agents")).json();
  sel.innerHTML = items.map(it=>`<option value="${it.key}" data-target="${it.target}">${it.target}</option>`).join("");
})();
</script>
</body>
</html>
