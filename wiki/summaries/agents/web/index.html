<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A1 需求获取对话 · 教育培训机构教务收费管理系统</title>
<style>
  :root{
    --bg:#f4f6fb; --panel:#fff; --ink:#1f2a44; --muted:#6b7794;
    --line:#e5e9f2; --agent:#eef2ff; --agentbd:#c7d2fe;
    --self:#0f7b6c; --selfink:#fff; --accent:#3b5bdb;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column}
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 18px;
    display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:700}
  header .sub{font-size:12px;color:var(--muted)}
  select,button{font-size:14px;border:1px solid var(--line);border-radius:8px;padding:7px 12px;background:#fff;cursor:pointer}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .spacer{flex:1}
  main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;max-width:920px;width:100%;margin:0 auto}
  .row{display:flex;gap:10px;max-width:82%}
  .row.self{align-self:flex-end;flex-direction:row-reverse}
  .row.agent{align-self:flex-start}
  .avatar{width:34px;height:34px;border-radius:50%;flex:0 0 34px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
  .agent .avatar{background:var(--accent)}
  .self .avatar{background:var(--self)}
  .bubble{padding:11px 14px;border-radius:12px;white-space:pre-wrap;word-break:break-word;line-height:1.6;font-size:14px}
  .agent .bubble{background:var(--agent);border:1px solid var(--agentbd)}
  .self .bubble{background:var(--self);color:var(--selfink)}
  .who{font-size:11px;color:var(--muted);margin-bottom:3px}
  footer{background:var(--panel);border-top:1px solid var(--line);padding:12px 18px}
  .toolbar{max-width:920px;margin:0 auto 8px;display:flex;gap:8px;flex-wrap:wrap}
  .inputbar{max-width:920px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;resize:none;height:54px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
  .status{max-width:920px;margin:6px auto 0;font-size:12px;color:var(--muted);min-height:16px}
  .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:40px}
</style>
</head>
<body>
  <header>
    <div>
      <h1>A1 需求获取对话</h1>
      <div class="sub">己方=涉众 · 对方=A1 需求获取智能体 · 教育培训机构教务收费管理系统</div>
    </div>
    <div class="spacer"></div>
    <label class="sub">访谈涉众：</label>
    <select id="agentSel"></select>
    <button id="startBtn" class="primary">开始 / 重新访谈</button>
    <button id="restoreBtn">恢复上次保存</button>
    <button id="sumBtn">整理需求</button>
    <button id="saveBtn">保存到知识库</button>
    <label class="sub" style="margin-left:8px;cursor:pointer"><input type="checkbox" id="followupChk" /> 补访模式</label>
  </header>

  <div id="followupBar" style="display:none;background:#fffaf0;border-bottom:1px solid var(--line);padding:10px 18px">
    <div class="sub" style="margin-bottom:6px">
      <b>补访模式</b>：A1 只围绕下面这份「待澄清问题清单」逐条追问（不重头问）。可点「载入待澄清问题」自动填入该涉众的补访问题，或自行编辑。补访保存为单独的「补访记录」，不覆盖首访。
    </div>
    <textarea id="agenda" placeholder="待澄清问题清单（每行一条，或直接粘贴补访问题清单中该涉众那一节）…"
      style="width:100%;height:96px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical"></textarea>
    <button id="loadFollowupBtn" style="margin-top:6px">载入待澄清问题</button>
  </div>

  <main id="chat">
    <div class="hint">选择要访谈的涉众，点「开始 / 重新访谈」，A1 智能体会先开场提问。<br/>你（扮演涉众）在下方输入框作答，回答内容取自教师 5000 平台对应涉众 agent。<br/>需要补充澄清遗留问题时，勾选右上角「补访模式」。</div>
  </main>

  <footer>
    <div class="toolbar"></div>
    <div class="inputbar">
      <textarea id="input" placeholder="以涉众身份作答…（Enter 发送，Shift+Enter 换行）"></textarea>
      <button id="sendBtn" class="primary">发送</button>
    </div>
    <div class="status" id="status"></div>
  </footer>

<script>
const $ = s => document.querySelector(s);
const chat = $("#chat"), input = $("#input"), status = $("#status"), sel = $("#agentSel");
const followupChk = $("#followupChk"), agendaEl = $("#agenda"), followupBar = $("#followupBar");
let messages = [];      // {role:'user'(涉众)|'assistant'(A1), content}
let targetName = "";
let busy = false;

function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML;}
function curTarget(){ const o = sel.options[sel.selectedIndex]; return o ? o.dataset.target : ""; }
function isFollowup(){ return followupChk.checked; }
function curMode(){ return isFollowup() ? "补访" : "首访"; }
// 本地缓存按 涉众+模式 分键，首访/补访互不覆盖
function lsKey(){ return "a1_chat_" + sel.value + (isFollowup() ? "_补访" : ""); }
function persist(){ try{ if(sel.value && messages.length) localStorage.setItem(lsKey(), JSON.stringify({target:targetName, messages})); }catch(e){} }
function restoreLocal(){
  try{
    const raw = localStorage.getItem(lsKey());
    if(raw){ const d = JSON.parse(raw);
      if(d && d.messages && d.messages.length){ targetName = d.target || curTarget(); messages = d.messages; render(); return messages.length; } }
  }catch(e){}
  return 0;
}

function render(){
  chat.innerHTML = "";
  if(messages.length===0){
    chat.innerHTML = '<div class="hint">选择涉众，点「开始 / 重新访谈」开始；<br/>若之前存过，点「恢复上次保存」可找回。</div>'; return;
  }
  for(const m of messages){
    const self = m.role==="user";
    const who = self ? ("涉众（"+targetName+"）" ) : "A1 需求获取智能体";
    const ava = self ? "涉众" : "A1";
    chat.insertAdjacentHTML("beforeend",
      `<div class="row ${self?'self':'agent'}"><div class="avatar">${ava}</div>`+
      `<div><div class="who">${who}</div><div class="bubble">${esc(m.content)}</div></div></div>`);
  }
  chat.scrollTop = chat.scrollHeight;
}

async function callChat(maxTokens){
  busy = true; setBusy(); status.textContent = "A1 智能体思考中…";
  try{
    const payload = {agent:sel.value, messages:messages};
    if(maxTokens) payload.max_tokens = maxTokens;
    if(isFollowup() && agendaEl.value.trim()) payload.agenda = agendaEl.value.trim();   // 补访提纲
    const r = await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)});
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    messages.push({role:"assistant", content:d.reply});
    render(); persist(); status.textContent="";
  }catch(e){ status.textContent = "出错："+e.message; }
  finally{ busy=false; setBusy(); }
}
function setBusy(){ for(const b of ["#startBtn","#sendBtn","#sumBtn","#saveBtn","#restoreBtn","#loadFollowupBtn"]) $(b).disabled=busy; }

// 补访模式切换：显示/隐藏提纲面板，并按新模式恢复对应缓存
followupChk.addEventListener("change", ()=>{
  followupBar.style.display = isFollowup() ? "block" : "none";
  messages = []; render();
  const n = restoreLocal();
  status.textContent = (isFollowup() ? "已切到补访模式。" : "已切回首访模式。")
    + (n ? ("自动恢复缓存对话 "+n+" 条。") : (isFollowup() ? "请「载入待澄清问题」或粘贴提纲后开始。" : ""));
});

// 载入该涉众的补访问题（从 补访问题清单-v1.0.md）
$("#loadFollowupBtn").onclick = async ()=>{
  if(busy) return;
  status.textContent = "载入待澄清问题…";
  try{
    const r = await fetch("/api/followup?agent="+encodeURIComponent(sel.value));
    const d = await r.json();
    if(d.agenda){ agendaEl.value = d.agenda; status.textContent = "已载入「"+d.target+"」的补访问题，可编辑后点「开始 / 重新访谈」。"; }
    else { status.textContent = "未找到：" + (d.error||""); }
  }catch(e){ status.textContent = "载入失败："+e.message; }
};

$("#startBtn").onclick = async ()=>{
  if(busy) return;
  if(isFollowup() && !agendaEl.value.trim()){ status.textContent="补访模式：请先「载入待澄清问题」或粘贴提纲"; return; }
  if(messages.length && !confirm("将清空当前对话、重新开始访谈，确定？")) return;
  targetName = curTarget();
  messages = [];
  try{ localStorage.removeItem(lsKey()); }catch(e){}
  render(); await callChat();              // 空 → 后端 kickoff 让 A1 开场（补访则带提纲）
};
$("#restoreBtn").onclick = async ()=>{
  if(busy) return;
  status.textContent = "正在恢复…";
  try{                                     // 按当前模式从服务端取最后保存，再回退浏览器缓存
    const r = await fetch("/api/last?agent="+encodeURIComponent(sel.value)+"&kind="+encodeURIComponent(curMode()));
    if(r.ok){ const d = await r.json();
      if(d.messages && d.messages.length){
        targetName = d.target || curTarget(); messages = d.messages; render(); persist();
        status.textContent = "已从上次保存（"+(d.saved_at||"")+"，"+(d.kind||curMode())+"）恢复，共 "+messages.length+" 条"; return; } }
    const n = restoreLocal();
    status.textContent = n ? ("服务端无存档，已从浏览器缓存恢复 "+n+" 条") : "无法恢复：未找到上次保存的对话记录";
  }catch(e){
    const n = restoreLocal();
    status.textContent = n ? ("已从浏览器缓存恢复 "+n+" 条") : ("无法恢复："+e.message);
  }
};
$("#sendBtn").onclick = async ()=>{
  if(busy) return;
  const t = input.value.trim(); if(!t) return;
  if(messages.length===0){ status.textContent="请先点「开始 / 重新访谈」或「恢复上次保存」"; return; }
  messages.push({role:"user", content:t}); input.value=""; render(); persist(); await callChat();
};
$("#sumBtn").onclick = async ()=>{
  if(busy || messages.length===0) return;
  const prompt = isFollowup()
    ? "请把本次补访中已澄清的内容整理成结构化结论：逐条给出 涉及的原 REQ/ISSUE 编号、澄清前的疑点、涉众明确的答复（含具体数字/规则）、对需求的修订建议。最后说明清单里还有哪些未澄清。"
    : "请通览我们从这次访谈开头到现在的【完整对话】，把已经聊到的【所有】需求毫无遗漏地整理成结构化需求条目。要求：①覆盖全程涉及的每一个模块/话题，不要只整理最近一段；②逐条给出 REQ 编号、需求来源、涉众原话（直接引用）、需求提炼、优先级、验收要点；③合并重复、补全之前因篇幅被截断的条目；④最后用一句话说明还有哪些模块尚未访谈、建议后续补充。";
  messages.push({role:"user", content:prompt});
  render(); persist(); await callChat(4096);   // 给足输出预算，避免截断
};
$("#saveBtn").onclick = async ()=>{
  if(messages.length===0){ status.textContent="还没有对话内容"; return; }
  const lines = messages.map(m => (m.role==="user"?("【涉众·"+targetName+"】"):"【A1需求获取】")+"\n"+m.content).join("\n\n");
  const r = await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({agent:sel.value, target:targetName, kind:curMode(), transcript:lines, messages:messages})});
  const d = await r.json();
  status.textContent = d.path ? ("已保存到知识库（"+(d.kind||curMode())+"）："+d.path) : ("保存失败："+(d.error||""));
};
input.addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); $("#sendBtn").click(); }});
sel.addEventListener("change", ()=>{       // 切换涉众：清空、按当前模式恢复缓存；补访则清空提纲待重新载入
  targetName = curTarget(); messages = []; render();
  if(isFollowup()) agendaEl.value = "";
  const n = restoreLocal();
  status.textContent = n ? ("已自动恢复浏览器缓存中该涉众的对话（"+n+" 条）")
    : (isFollowup() ? "补访模式：请「载入待澄清问题」或粘贴提纲。" : "");
});

(async function init(){
  const items = await (await fetch("/api/agents")).json();
  sel.innerHTML = items.map(it=>`<option value="${it.key}" data-target="${it.target}">${it.target}</option>`).join("");
  targetName = curTarget();
  const n = restoreLocal();                // 打开页面即尝试自动恢复（关服务重开也不丢）
  if(n) status.textContent = "已自动恢复浏览器缓存中的对话（"+n+" 条）；要从服务端最后保存恢复，点「恢复上次保存」";
})();
</script>
</body>
</html>
